name: Publish

# Manual-only. Publishing is done locally from the maintainer's machine via
# `./gradlew :compose-pdf:publishAndReleaseToMavenCentral --no-configuration-cache`,
# matching the rest of the cmp-libs portfolio. This workflow exists so a maintainer
# can opt in to CI-based publishing later by populating the repo secrets and triggering
# it manually from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to Maven Central
        env:
          RELEASE_VERSION: ${{ inputs.tag }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew :compose-pdf:publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ inputs.tag }}" --generate-notes --verify-tag
